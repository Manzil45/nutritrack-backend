name: Backend CI/CD with Staging

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  NODE_VERSION: 22
  REGISTRY: nutritrackregistry.azurecr.io
  IMAGE_NAME: nutritrack-backend

jobs:
  # ==================== CI: TEST & BUILD ====================
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      # ✅ PERBAIKAN 1: Lint sekarang WAJIB, pipeline stop kalau gagal
      - name: Lint Code
        run: npm run lint

      # ✅ PERBAIKAN 2: Hapus continue-on-error, test sekarang WAJIB lulus
      - name: Run Unit Tests
        run: npm test

      - name: Run Integration Tests
        run: npm run test:integration

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage-final.json
          flags: backend
          fail_ci_if_error: false

      - name: Security Audit
        run: npm audit --audit-level=high

      # ---- BUILD & PUSH DOCKER IMAGE ----
      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  notify-ci-success:
    name: Notify CI Success
    needs: ci
    if: success()
    runs-on: ubuntu-latest

    steps:
      - name: Notify Discord
        run: |
          curl -X POST ${{ secrets.DISCORD_WEBHOOK_URL }} \
          -H "Content-Type: application/json" \
          -d '{
            "embeds": [{
              "title": "✅ CI SUCCESS",
              "description": "Continuous Integration berhasil.",
              "color": 3066993,
              "fields": [
                {"name": "Branch", "value": "${{ github.ref_name }}"},
                {"name": "Commit", "value": "${{ github.sha }}"},
                {"name": "Triggered By", "value": "${{ github.actor }}"},
                {"name": "Workflow", "value": "${{ github.workflow }}"},
                {"name": "Checks Passed", "value": "Lint, Tests, Security Audit, Docker Build"},
                {"name": "Logs", "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}
              ]
            }]
          }'

  # ==================== STAGING ====================
  deploy-staging:
    name: Deploy to Staging
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: staging
      url: https://nutritrack-backend-staging-container-dhbhgca0hvatgabz.indonesiacentral-01.azurewebsites.net

    steps:
      - name: Deploy to Azure Web App (Staging)
        uses: azure/webapps-deploy@v3
        with:
          app-name: nutritrack-backend-staging-container
          publish-profile: ${{ secrets.AZURE_WEBAPP_STAGING_PUBLISH_PROFILE }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Run Migrations on Staging
        run: |
          npm run migrate:up --if-present || echo "No migration script"
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

  # ==================== SMOKE TEST STAGING ====================
  smoke-tests-staging:
    name: Smoke Tests on Staging
    needs: deploy-staging
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Wait for Staging to be Ready
        run: |
          for i in {1..30}; do
            if curl -f https://nutritrack-backend-staging-container-dhbhgca0hvatgabz.indonesiacentral-01.azurewebsites.net/api/health; then
              echo "Staging is ready"
              exit 0
            fi
            echo "Attempt $i failed, retrying..."
            sleep 10
          done
          exit 1

      - name: Run Smoke Tests
        run: |
          npm install -g newman
          newman run ./tests/postman/smoke-tests.json \
            -e ./tests/postman/staging-env.json \
            --reporters cli,json \
            --reporter-json-export=smoke-test-results.json
        env:
          STAGING_API_URL: https://nutritrack-backend-staging-container-dhbhgca0hvatgabz.indonesiacentral-01.azurewebsites.net

      - name: Upload Smoke Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: smoke-test-results.json

      - name: Check Gemini AI Integration
        continue-on-error: true
        run: |
          curl -X POST https://nutritrack-backend-staging-container-dhbhgca0hvatgabz.indonesiacentral-01.azurewebsites.net/api/nutrition/analyze \
            -H "Authorization: Bearer ${{ secrets.STAGING_TEST_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "meal": "Apple and peanut butter",
              "servingSize": "1 medium apple + 2 tbsp PB"
            }' | jq . || true

      - name: Performance Check
        continue-on-error: true
        run: |
          echo "Checking API response times..."
          for endpoint in "/api/health" "/api/users/profile" "/api/meals"; do
            time_taken=$(curl -o /dev/null -s -w '%{time_total}' \
              -H "Authorization: Bearer ${{ secrets.STAGING_TEST_TOKEN }}" \
              https://nutritrack-backend-staging-container-dhbhgca0hvatgabz.indonesiacentral-01.azurewebsites.net$endpoint)
            echo "Endpoint $endpoint took ${time_taken}s"
            if (( $(echo "$time_taken > 3.0" | bc -l) )); then
              echo "⚠️ Warning: Slow response time detected"
            fi
          done

  # ==================== E2E TESTING ====================
  e2e-testing:
    name: End-to-End Testing
    needs: smoke-tests-staging
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run E2E Tests (User Journey)
        run: |
          npm install -g newman
          newman run ./tests/postman/e2e-tests.json \
            -e ./tests/postman/staging-env.json \
            --reporters cli,json \
            --reporter-json-export=e2e-test-results.json

      - name: Upload E2E Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: e2e-test-results.json

  notify-staging-success:
    name: Notify Staging Success
    needs: smoke-tests-staging
    if: success()
    runs-on: ubuntu-latest

    steps:
      - name: Notify Discord
        run: |
          curl -X POST ${{ secrets.DISCORD_WEBHOOK_URL }} \
          -H "Content-Type: application/json" \
          -d '{
            "embeds": [{
              "title": "🟦 STAGING DEPLOYED",
              "description": "Deployment ke staging berhasil.",
              "color": 3447003,
              "fields": [
                {"name": "Environment", "value": "Staging"},
                {"name": "Branch", "value": "${{ github.ref_name }}"},
                {"name": "Commit", "value": "${{ github.sha }}"},
                {"name": "Smoke Test", "value": "PASSED"},
                {"name": "URL", "value": "https://nutritrack-backend-staging-container-dhbhgca0hvatgabz.indonesiacentral-01.azurewebsites.net"}
              ]
            }]
          }'




          # ==================== APPROVAL GATE ====================
  approval-gate:
    name: Approval Gate
    needs: smoke-tests-staging
    runs-on: ubuntu-latest
    environment:
      name: production-approval

    steps:
      - name: Notify Approval Required
        run: |
          curl -X POST ${{ secrets.DISCORD_WEBHOOK_URL }} \
          -H "Content-Type: application/json" \
          -d '{
            "embeds": [{
              "title": "📝 APPROVAL REQUIRED",
              "description": "Staging berhasil dan menunggu approval sebelum production.",
              "color": 16776960,
              "fields": [
                {"name": "Environment", "value": "Staging"},
                {"name": "Branch", "value": "${{ github.ref_name }}"},
                {"name": "Commit", "value": "${{ github.sha }}"},
                {"name": "Reviewer Action", "value": "Approve deployment to Production"}
              ]
            }]
          }'

  # ==================== CD: DEPLOY PRODUCTION ====================
  deploy-production:
    name: Deploy to Production
    needs: approval-gate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    environment:
      name: production
      url: https://nutritrack-backend-bisa-cth6c8dte7cfcmbc.indonesiacentral-01.azurewebsites.net

    steps:
      - name: Deploy to Azure Web App (Production)
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: nutritrack-backend-bisa
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_BACKEND }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Health Check Production
        id: health-check
        run: |
          sleep 30
          for i in {1..10}; do
            if curl -f https://nutritrack-backend-bisa-cth6c8dte7cfcmbc.indonesiacentral-01.azurewebsites.net/api/health; then
              echo "✅ Production deployment healthy"
              exit 0
            fi
            sleep 5
          done
          exit 1

      - name: Mark Deployment as Stable
        if: success()
        run: |
          echo "Deployment succesful, marked as stable"

        # ---- BUILD & PUSH DOCKER IMAGE ----
      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      # step ci untuk push tag stable setelah deploy production sukses
      - name: Tag as Stable
        if: success()
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
                        ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:stable
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:stable

      # ✅ PERBAIKAN 3: Rollback otomatis kalau health check gagal
      - name: Rollback on Health Check Failure
        if: failure() && steps.health-check.outcome == 'failure'
        uses: azure/webapps-deploy@v3
        with:
          app-name: nutritrack-backend-bisa
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_BACKEND }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:stable

      - name: Notify Rollback
        if: failure() && steps.health-check.outcome == 'failure'
        run: |
          curl -X POST ${{ secrets.DISCORD_WEBHOOK_URL }} \
          -H "Content-Type: application/json" \
          -d '{
            "embeds": [{
              "title": "⚠️ Production Health Check Failed — Rolled Back!",
              "description": "Health check gagal, NutriTrack Backend di-rollback ke versi sebelumnya.",
              "color": 16776960,
              "fields": [
                {"name": "App", "value": "nutritrack-backend-bisa"},
                {"name": "Commit Gagal", "value": "${{ github.sha }}"},
                {"name": "Branch", "value": "${{ github.ref_name }}"},
                {"name": "Logs", "value": "[Klik di sini](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"}
              ]
            }]
          }'

      - name: Notify Deployment Success
        if: success()
        run: |
          curl -X POST ${{ secrets.DISCORD_WEBHOOK_URL }} \
          -H "Content-Type: application/json" \
          -d '{
            "embeds": [{
              "title": "🚀 Backend Production Deployment Successful!",
              "description": "NutriTrack Backend berhasil deploy ke production.",
              "color": 2664261,
              "fields": [
              {"name": "App", "value": "nutritrack-backend-bisa"},
              {"name": "Environment", "value": "Production"},
              {"name": "Commit", "value": "${{ github.sha }}"},
              {"name": "Branch", "value": "${{ github.ref_name }}"},
              {"name": "Triggered By", "value": "${{ github.actor }}"},
              {"name": "Workflow", "value": "${{ github.workflow }}"},
              {"name": "Health Check", "value": "PASSED"},
              {"name": "Logs", "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}
            ]
            }]
          }'

  # ==================== ERROR NOTIFICATION ====================
  # ✅ PERBAIKAN 4: Tambah deploy-production ke needs supaya notif kalau production gagal
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    if: failure()
    needs: [ci, deploy-staging, smoke-tests-staging, deploy-production]

    steps:
      - name: Notify Discord on Failure
        run: |
          curl -X POST ${{ secrets.DISCORD_WEBHOOK_URL }} \
          -H "Content-Type: application/json" \
          -d '{
            "embeds": [{
              "title": "❌ Backend CI/CD Pipeline Failed!",
              "description": "Pipeline **Backend CI/CD with Staging** gagal.",
              "color": 15158332,
              "fields": [
              {"name": "App", "value": "nutritrack-backend-bisa"},
              {"name": "Branch", "value": "${{ github.ref_name }}"},
              {"name": "Commit", "value": "${{ github.sha }}"},
              {"name": "Triggered By", "value": "${{ github.actor }}"},
              {"name": "Workflow", "value": "${{ github.workflow }}"},
              {"name": "Run Number", "value": "${{ github.run_number }}"},
              {"name": "Logs", "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}
            ]
            }]
          }'
