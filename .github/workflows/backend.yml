name: Backend CI/CD with Staging

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  NODE_VERSION: 22
  REGISTRY: nutritrackregistry.azurecr.io
  IMAGE_NAME: nutritrack-backend

jobs:
  # ==================== CI: TEST & BUILD ====================
  # Jalan di GitHub Actions runner (simulasi local)
  # Tugas: lint, test, build docker image, push ke registry
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Lint Code
        run: npm run lint --if-present || echo "No lint script found"

      # ---- UNIT TEST ----
      - name: Run Unit Tests
        run: npm test -- --coverage --passWithNoTests
        continue-on-error: true

      # ---- ARTIFACT 1: Coverage Report (hasil unit test) ----
      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage-final.json
          flags: backend
          fail_ci_if_error: false

      - name: Security Audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      # ---- BUILD & PUSH DOCKER IMAGE ----
      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ==================== STAGING ====================
  # Deploy ke Azure staging (DB sample, untuk review client/atasan/dosen)
  # DB: MONGO_URI staging = database baru khusus staging, bukan production
  deploy-staging:
    name: Deploy to Staging
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: staging
      url: https://nutritrack-backend-staging-container-dhbhgca0hvatgabz.indonesiacentral-01.azurewebsites.net

    steps:
      - name: Deploy to Azure Web App (Staging)
        uses: azure/webapps-deploy@v3
        with:
          app-name: nutritrack-backend-staging-container
          publish-profile: ${{ secrets.AZURE_WEBAPP_STAGING_PUBLISH_PROFILE }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Run Migrations on Staging
        run: |
          npm run migrate:up --if-present || echo "No migration script"
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

  # ==================== SMOKE TEST STAGING ====================
  # Verifikasi staging berjalan normal sebelum lanjut ke production
  smoke-tests-staging:
    name: Smoke Tests on Staging
    needs: deploy-staging
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Wait for Staging to be Ready
        run: |
          for i in {1..30}; do
            if curl -f https://nutritrack-backend-staging-container-dhbhgca0hvatgabz.indonesiacentral-01.azurewebsites.net/api/health; then
              echo "Staging is ready"
              exit 0
            fi
            echo "Attempt $i failed, retrying..."
            sleep 10
          done
          exit 1

      # ---- SMOKE TEST (tidak block pipeline) ----
      - name: Run Smoke Tests
        continue-on-error: true
        run: |
          npm install -g newman
          newman run ./tests/postman/smoke-tests.json \
            -e ./tests/postman/staging-env.json \
            --reporters cli,json \
            --reporter-json-export=smoke-test-results.json
        env:
          STAGING_API_URL: https://nutritrack-backend-staging-container-dhbhgca0hvatgabz.indonesiacentral-01.azurewebsites.net

      # ---- ARTIFACT 2: Smoke Test Results ----
      - name: Upload Smoke Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: smoke-test-results.json

      # ---- CEK GEMINI AI (tidak block pipeline) ----
      - name: Check Gemini AI Integration
        continue-on-error: true
        run: |
          curl -X POST https://nutritrack-backend-staging-container-dhbhgca0hvatgabz.indonesiacentral-01.azurewebsites.net/api/nutrition/analyze \
            -H "Authorization: Bearer ${{ secrets.STAGING_TEST_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "meal": "Apple and peanut butter",
              "servingSize": "1 medium apple + 2 tbsp PB"
            }' | jq . || true

      # ---- PERFORMANCE CHECK (tidak block pipeline) ----
      - name: Performance Check
        continue-on-error: true
        run: |
          echo "Checking API response times..."
          for endpoint in "/api/health" "/api/users/profile" "/api/meals"; do
            time_taken=$(curl -o /dev/null -s -w '%{time_total}' \
              -H "Authorization: Bearer ${{ secrets.STAGING_TEST_TOKEN }}" \
              https://nutritrack-backend-staging-container-dhbhgca0hvatgabz.indonesiacentral-01.azurewebsites.net$endpoint)
            echo "Endpoint $endpoint took ${time_taken}s"
            if (( $(echo "$time_taken > 3.0" | bc -l) )); then
              echo "⚠️ Warning: Slow response time detected"
            fi
          done

  # ==================== APPROVAL GATE ====================
  # Manual review staging sebelum deploy ke production
  # Tim/dosen bisa cek staging dulu di URL staging
  approval-gate:
    name: Approval Gate
    needs: smoke-tests-staging
    runs-on: ubuntu-latest
    environment:
      name: production-approval

    steps:
      - name: Notify Approval Required
        run: |
          echo "✅ Staging deployment successful"
          echo "📋 Awaiting manual approval to proceed to production"
          echo "🔗 Review staging: https://nutritrack-backend-staging-container-dhbhgca0hvatgabz.indonesiacentral-01.azurewebsites.net"

  # ==================== CD: DEPLOY PRODUCTION ====================
  # Hanya jalan setelah manual approval
  # DB: MONGO_URI production = database real/production
  deploy-production:
    name: Deploy to Production
    needs: approval-gate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    environment:
      name: production
      url: https://nutritrack-backend-bisa-cth6c8dte7cfcmbc.indonesiacentral-01.azurewebsites.net

    steps:
      - name: Deploy to Azure Web App (Production)
        uses: azure/webapps-deploy@v3
        with:
          app-name: nutritrack-backend-bisa
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_BACKEND }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Health Check Production
        run: |
          sleep 30
          for i in {1..10}; do
            if curl -f https://nutritrack-backend-bisa-cth6c8dte7cfcmbc.indonesiacentral-01.azurewebsites.net/api/health; then
              echo "✅ Production deployment healthy"
              exit 0
            fi
            sleep 5
          done
          exit 1

      - name: Notify Deployment Success
        run: |
          curl -X POST ${{ secrets.DISCORD_WEBHOOK_URL }} \
          -H "Content-Type: application/json" \
          -d '{
            "embeds": [{
              "title": "🚀 Backend Production Deployment Successful!",
              "description": "NutriTrack Backend berhasil deploy ke production.",
              "color": 2664261,
              "fields": [
                {"name": "App", "value": "nutritrack-backend-bisa"},
                {"name": "Commit", "value": "${{ github.sha }}"},
                {"name": "Branch", "value": "${{ github.ref_name }}"},
                {"name": "Triggered by", "value": "${{ github.actor }}"},
                {"name": "Logs", "value": "[Klik di sini](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"}
              ]
            }]
          }'

  # ==================== ERROR NOTIFICATION ====================
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    if: failure()
    needs: [ci, deploy-staging, smoke-tests-staging]

    steps:
      - name: Notify Discord on Failure
        run: |
          curl -X POST ${{ secrets.DISCORD_WEBHOOK_URL }} \
          -H "Content-Type: application/json" \
          -d '{
            "embeds": [{
              "title": "❌ Backend CI/CD Pipeline Failed!",
              "description": "Pipeline **Backend CI/CD with Staging** gagal.",
              "color": 15158332,
              "fields": [
                {"name": "Branch", "value": "${{ github.ref_name }}"},
                {"name": "Triggered by", "value": "${{ github.actor }}"},
                {"name": "Logs", "value": "[Klik di sini](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"}
              ]
            }]
          }'
